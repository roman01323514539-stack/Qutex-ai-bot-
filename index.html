<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>নগদ পেমেন্ট গেটওয়ে | Sotota Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background: #fdfdfd; }
        .nagad-orange { background: linear-gradient(135deg, #F7941D 0%, #E07C1A 100%); }
        .nagad-text { color: #F7941D; }
        
        .toast-custom {
            visibility: hidden; min-width: 280px; background: #1F2937; color: white;
            text-align: center; border-radius: 1rem; padding: 14px 20px; position: fixed;
            z-index: 1000; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
            opacity: 0; transition: all 0.3s ease; font-weight: 600;
        }
        .toast-custom.show { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }
        
        .loading-spinner {
            display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .banner-container::-webkit-scrollbar { display: none; }
        .banner-container { -ms-overflow-style: none; scrollbar-width: none; }
        .banner-img { 
            width: 160px; height: 95px; object-fit: cover; border-radius: 15px; 
            flex-shrink: 0; border: 2px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen px-4 py-6 bg-gray-50">

    <div class="max-w-md w-full bg-white rounded-[35px] shadow-2xl overflow-hidden border border-gray-100">
        
        <!-- Header -->
        <div class="nagad-orange p-6 text-white flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white p-2 rounded-xl shadow-inner">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Nagad_Logo.svg/1200px-Nagad_Logo.svg.png" class="w-8 h-8 object-contain">
                </div>
                <div>
                    <h1 class="font-black text-xl">নগদ পেমেন্ট</h1>
                    <p class="text-[9px] opacity-80 font-bold uppercase tracking-widest">Sotota Shop Official</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-bold opacity-70">পেমেন্ট পরিমাণ</p>
                <h2 class="text-3xl font-black">৳ <span id="display-amount">0</span></h2>
            </div>
        </div>

        <div class="py-6">
            <!-- Order Info (ছোট করে দেখানো) -->
            <div class="px-6 mb-4">
                <div class="bg-gray-50 rounded-xl p-3 text-sm">
                    <div class="flex justify-between mb-1">
                        <span class="text-gray-500">অর্ডার আইডি:</span>
                        <span id="order-id" class="font-mono text-xs text-gray-700">-</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-500">পেমেন্ট মেথড:</span>
                        <span class="font-semibold nagad-text">নগদ</span>
                    </div>
                </div>
            </div>

            <!-- Dynamic Banner Section -->
            <div class="px-6 mb-6">
                <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-3 ml-1">কিভাবে টাকা পাঠাবেন? (ধাপগুলো দেখুন)</label>
                <div id="banner-list" class="flex gap-3 overflow-x-auto banner-container pb-2">
                    <div class="banner-img shimmer"></div>
                    <div class="banner-img shimmer"></div>
                    <div class="banner-img shimmer"></div>
                </div>
            </div>

            <div class="px-6">
                <!-- Instruction Alert -->
                <div class="bg-orange-50 border-l-4 border-[#F7941D] p-4 rounded-2xl mb-6">
                    <p class="text-xs font-bold text-gray-700">
                        📱 নিচের <span class="nagad-text underline">পার্সোনাল</span> নম্বরে <span class="nagad-text">Send Money</span> করুন। টাকা পাঠানোর পর ট্রানজেকশন আইডি (TrxID) দিন।
                    </p>
                </div>

                <!-- Number Card -->
                <div class="mb-8">
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2 ml-1">নগদ পার্সোনাল নম্বর</label>
                    <div onclick="copyNumber()" id="number-card" class="bg-gradient-to-br from-white to-gray-50 border-2 border-orange-100 rounded-3xl p-5 flex items-center justify-between cursor-pointer active:scale-95 transition-all">
                        <div class="flex-1">
                            <span id="display-number" class="text-3xl font-black text-gray-800 tracking-tight">লোড হচ্ছে...</span>
                            <p class="text-[10px] text-gray-400 mt-1">🔁 কপি করতে এখানে ক্লিক করুন</p>
                        </div>
                        <div class="nagad-orange text-white p-3 rounded-2xl">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                        </div>
                    </div>
                </div>

                <!-- TrxID Input -->
                <div class="space-y-5">
                    <div>
                        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest block mb-2 ml-1">ট্রানজেকশন আইডি (TrxID)</label>
                        <input type="text" id="trx-input" placeholder="8N7A9X2K5L" autocomplete="off" 
                               class="w-full p-5 bg-gray-50 border-2 border-gray-100 rounded-3xl text-center font-mono font-bold text-xl uppercase focus:border-[#F7941D] outline-none transition-all">
                    </div>
                    
                    <button id="submit-btn" onclick="sendPayment()" 
                            class="w-full nagad-orange text-white font-bold py-5 rounded-[20px] shadow-lg shadow-orange-200 uppercase text-sm tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2">
                        পেমেন্ট নিশ্চিত করুন
                    </button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="bg-gray-50 p-4 text-center border-t border-gray-100">
            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">🔒 SSL Secured • Sotota Shop Payment Gateway</p>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toastMsg" class="toast-custom">✨ নগদ নম্বর কপি হয়েছে!</div>

    <script>
        // Firebase কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyBiG7ssePTyaKavznWmQsdpAq4Q2NUWyeA",
            authDomain: "my-app-7e2b8.firebaseapp.com",
            databaseURL: "https://my-app-7e2b8-default-rtdb.firebaseio.com",
            projectId: "my-app-7e2b8",
            storageBucket: "my-app-7e2b8.firebasestorage.app",
            messagingSenderId: "683941019095",
            appId: "1:683941019095:web:6a82c99ca567aada679f92"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // URL থেকে প্যারামিটার নেওয়া
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId');
        const amount = urlParams.get('amount') || "0";
        const method = urlParams.get('method') || "nagad";
        
        const amountSpan = document.getElementById('display-amount');
        const numberSpan = document.getElementById('display-number');
        const bannerList = document.getElementById('banner-list');
        const trxInput = document.getElementById('trx-input');
        const submitBtn = document.getElementById('submit-btn');
        const orderIdSpan = document.getElementById('order-id');
        
        amountSpan.innerText = amount;
        if(orderId) orderIdSpan.innerText = orderId.substring(0, 8) + '...';
        
        // ব্যানার লোড
        db.collection("settings").doc("banners").onSnapshot((doc) => {
            if(doc.exists) {
                const data = doc.data();
                let bannerHTML = '';
                for(let i=1; i<=6; i++) {
                    const imgUrl = data[`img${i}`];
                    if(imgUrl) {
                        bannerHTML += `<img src="${imgUrl}" class="banner-img" alt="Step ${i}">`;
                    }
                }
                bannerList.innerHTML = bannerHTML || '<p class="text-xs text-gray-400">ব্যানার পাওয়া যায়নি</p>';
            }
        });

        // নগদ নম্বর লোড
        db.collection("settings").doc("nagad").onSnapshot((doc) => {
            if(doc.exists && doc.data().number) {
                numberSpan.innerText = doc.data().number;
            } else {
                numberSpan.innerText = "নম্বর সেট নেই";
            }
        });

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toastMsg');
            toast.innerText = msg;
            toast.style.background = isError ? "#ef4444" : "#1F2937";
            toast.className = "toast-custom show";
            setTimeout(() => { toast.className = "toast-custom"; }, 2500);
        }

        window.copyNumber = function() {
            if(numberSpan.innerText.includes("লোড") || numberSpan.innerText === "নম্বর সেট নেই") return;
            navigator.clipboard.writeText(numberSpan.innerText).then(() => {
                showToast("📋 নগদ নম্বর কপি হয়েছে!");
            });
        };

        window.sendPayment = async function() {
            const trx = trxInput.value.trim().toUpperCase();
            if(!trx) return showToast("❌ TrxID লিখুন!", true);
            
            if(!orderId) {
                showToast("⚠️ অর্ডার আইডি নেই! শুধু পেমেন্ট রেকর্ড করা হবে।", true);
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="loading-spinner mr-2"></span> যাচাই হচ্ছে...`;

            try {
                const check = await db.collection("payments").where("trxid", "==", trx).get();
                if(!check.empty) {
                    showToast("⚠️ এই TrxID আগেই ব্যবহার হয়েছে!", true);
                } else {
                    await db.collection("payments").add({
                        trxid: trx,
                        amount: amount,
                        method: method,
                        orderId: orderId || null,
                        status: "Pending",
                        time: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    if(orderId) {
                        await db.collection("orders").doc(orderId).update({
                            trx: trx,
                            paymentStatus: "completed",
                            paymentTime: new Date().toISOString()
                        });
                        showToast("✅ পেমেন্ট সফল! অর্ডার কনফার্ম হয়েছে!");
                    } else {
                        showToast("✅ পেমেন্ট রেকর্ড করা হয়েছে!");
                    }
                    
                    trxInput.value = "";
                    
                    setTimeout(() => {
                        window.close();
                    }, 2000);
                }
            } catch (e) {
                console.error(e);
                showToast("❌ নেটওয়ার্ক ত্রুটি!", true);
            }
            submitBtn.disabled = false;
            submitBtn.innerHTML = "পেমেন্ট নিশ্চিত করুন";
        };

        trxInput.addEventListener("input", function() { this.value = this.value.toUpperCase(); });
    </script>
</body>
    </html>
