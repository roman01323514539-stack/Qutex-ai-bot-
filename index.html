<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নগদ পেমেন্ট গেটওয়ে</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .nagad-orange { background-color: #F7941D; }
        .nagad-text { color: #F7941D; }
        .toast {
            visibility: hidden; min-width: 250px; background-color: #333; color: #fff;
            text-align: center; border-radius: 12px; padding: 15px; position: fixed;
            z-index: 100; bottom: 30px; left: 50%; transform: translateX(-50%);
        }
        .toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body class="flex flex-col items-center pt-10 px-4">

    <div class="mb-8">
        <img src="https://freelogopng.com/images/all_img/1679248787nagad-logo-png.png" class="h-16 w-auto" alt="Nagad">
    </div>

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden border-t-[12px] border-[#F7941D]">
        
        <div class="p-6 bg-gray-50 border-b flex justify-between items-center">
            <div>
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">মার্চেন্ট</p>
                <h3 class="text-sm font-black text-gray-700">SOTOTA ELECTRONICS</h3>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">পরিমাণ</p>
                <h2 class="text-3xl font-black nagad-text italic">৳ <span id="display-amount">0</span></h2>
            </div>
        </div>

        <div class="p-8">
            <div class="bg-orange-50 border-l-4 border-[#F7941D] p-4 rounded-r-xl mb-8">
                <p class="text-xs font-bold text-[#F7941D] leading-relaxed italic">
                    নিচের নগদ পার্সোনাল নাম্বারে টাকা "Send Money" করুন। এরপর TrxID নিচে লিখে নিশ্চিত করুন।
                </p>
            </div>

            <div class="mb-10">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">নগদ নম্বর (পার্সোনাল)</label>
                <div onclick="copyNumber()" class="flex items-center justify-between bg-white p-5 rounded-2xl border-2 border-dashed border-orange-100 mt-2 hover:bg-orange-50 cursor-pointer group transition-all relative">
                    <span id="display-number" class="text-3xl font-black tracking-tighter text-gray-800 italic">লোড হচ্ছে...</span>
                    <div class="nagad-orange text-white p-2.5 rounded-xl shadow-md group-hover:scale-110 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2" />
                        </svg>
                    </div>
                </div>
                <p class="text-[10px] text-gray-400 text-center mt-3 italic font-medium">কপি করতে নাম্বারের উপর ক্লিক করুন</p>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="text-[11px] font-bold text-gray-500 uppercase ml-2 block mb-2 tracking-widest text-center">ট্রানজেকশন আইডি (TrxID)</label>
                    <input type="text" id="trx-input" placeholder="8N7X2K..." class="w-full p-5 bg-gray-50 rounded-2xl border-2 border-gray-100 focus:border-[#F7941D] focus:outline-none text-center font-mono font-bold text-2xl uppercase shadow-inner transition-all">
                </div>
                
                <button onclick="sendPayment()" class="w-full nagad-orange text-white font-bold py-5 rounded-2xl shadow-lg uppercase text-sm tracking-widest hover:bg-[#e0851a] active:scale-95 transition-all">পেমেন্ট নিশ্চিত করুন</button>
            </div>
        </div>

        <div class="bg-gray-100 p-4 text-center">
            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">© 2026 Sotota Electronics & Remittance Center</p>
        </div>
    </div>

    <div id="toast" class="toast font-bold">নগদ নম্বর কপি হয়েছে!</div>

    <script>
        // আপনার পেমেন্ট ফায়ারবেজ কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyAMfnJHzVyXCMgkPGJTEpom0bokbckAbZo",
            authDomain: "payment-a71bc.firebaseapp.com",
            projectId: "payment-a71bc",
            storageBucket: "payment-a71bc.firebasestorage.app",
            messagingSenderId: "904450864312",
            appId: "1:904450864312:web:9369048f1fb46e2b29304d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // URL থেকে অ্যামাউন্ট নেওয়া
        const urlParams = new URLSearchParams(window.location.search);
        const amount = urlParams.get('amount') || "0";
        document.getElementById('display-amount').innerText = amount;

        // নম্বর রিয়েল-টাইম লোড করা (অ্যাডমিন প্যানেল থেকে)
        db.collection("settings").doc("nagad").onSnapshot((doc) => {
            if(doc.exists) document.getElementById('display-number').innerText = doc.data().number;
            else document.getElementById('display-number').innerText = "নম্বর নেই";
        });

        // পেমেন্ট রিকোয়েস্ট পাঠানো
        async function sendPayment() {
            const trx = document.getElementById('trx-input').value;
            if(!trx) return alert("দয়া করে TrxID দিন!");
            
            try {
                await db.collection("payments").add({
                    trxid: trx.toUpperCase(),
                    amount: amount,
                    method: "nagad",
                    status: "Pending",
                    time: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("আপনার পেমেন্ট রিকোয়েস্ট জমা হয়েছে!");
                document.getElementById('trx-input').value = "";
            } catch (err) {
                alert("সমস্যা হয়েছে: " + err.message);
            }
        }

        // কপি করার ফাংশন
        function copyNumber() {
            const num = document.getElementById('display-number').innerText;
            if(num === "লোড হচ্ছে..." || num === "নম্বর নেই") return;

            navigator.clipboard.writeText(num).then(() => {
                var x = document.getElementById("toast");
                x.className = "toast show";
                setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
            });
        }
    </script>
</body>
</html>
